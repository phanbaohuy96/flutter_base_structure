name: core
description: A new Flutter package project.
version: 3.32.0

publish_to: none

environment:
  sdk: '>=3.3.1 <4.0.0'
  flutter: ">=3.32.0"

dependencies:
  flutter:
    sdk: flutter

  #language
  flutter_localizations:
    sdk: flutter
  sprintf: 7.0.0

  #base
  flutter_bloc: ^8.1.1
  bloc_concurrency: ^0.2.0
  shared_preferences: 2.5.3
  flutter_secure_storage: ^9.2.4
  get_it: ^7.2.0
  injectable: ^2.4.4
  intl: 0.20.2

  #utils
  date_format: ^2.0.2
  connectivity_plus: ^6.0.5
  permission_handler: ^12.0.0+1
  uuid: any
  timeago: ^3.1.0
  mime: ^1.0.2
  dartx: ^1.1.0
  equatable: ^2.0.5
  fl_utils:
    path: ../plugins/fl_utils
  event_bus: ^2.0.0
  geolocator: ^13.0.1
  diacritic:
  flutter_image_compress: ^2.1.0
  image: ^4.1.6

  #Hive
  hive_ce: ^2.19.3
  hive_ce_flutter: ^2.3.4

  #JSON
  json_annotation: 4.9.0
  freezed_annotation: 3.1.0
  phone_numbers_parser: ^9.0.3
  flutter_multi_formatter: ^2.12.1

  #ui
  fluttertoast: 8.2.12
  flashy_flushbar: 1.4.0
  flutter_spinkit: ^5.1.0
  flutter_easyloading: ^3.0.3
  dotted_border: ^2.0.0
  flutter_inappwebview: 6.0.0
  video_thumbnail: ^0.5.2
  video_player: ^2.4.5
  chewie: ^1.3.3
  table_calendar: ^3.0.7
  flutter_widget_from_html: 0.17.1
  photo_view: ^0.15.0
  pdfx: 2.9.2
  auto_size_text: ^3.0.0
  flutter_swipe_action_cell: ^3.1.2
  dropdown_button2: ^2.0.0
  expandable: ^5.0.1
  fl_ui:
    path: ../plugins/fl_ui
  fl_theme:
    path: ../plugins/fl_theme
  fl_media:
    path: ../plugins/fl_media

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.0.4
  retrofit_generator: 10.2.3
  hive_ce_generator: ^1.9.3
  json_serializable: ^6.11.1
  freezed: 3.2.3
  injectable_generator: ^2.6.2
  module_generator:
    path: ../tools/module_generator

dependency_overrides:
  # flutter_avif (used by fl_media) pins protobuf ^3.1.0 but retrofit_generator >=10.2.1
  # requires protobuf ^6.0.0. Override to ^6.0.0 (backward-compatible for flutter_avif's usage).
  protobuf: ^6.0.0

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:
  # l10n required
  generate: true
  
flutter_intl:
  enabled: true
